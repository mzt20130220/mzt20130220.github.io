title: MZT Blog
email: mzt20130220@hotmail.com
description: >-
  A simple, elegant blog about technology and programming.
baseurl: ""
url: "https://mzt20130220.github.io"
github_username: mzt20130220

permalink: /:title/

markdown: kramdown
highlighter: rouge
timezone: Asia/Shanghai

collections:
  posts:
    output: true
    permalink: /posts/:title/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: mzt20130220

kramdown:
  input: GFM
  syntax_highlighter: rouge

sass:
  style: compressed

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-archives

jekyll-archives:
  enabled:
    - categories
    - tags
  layouts:
    category: category
    tag: tag
  permalinks:
    category: /categories/:name/
    tag: /tags/:name/

feed:
  path: atom.xml